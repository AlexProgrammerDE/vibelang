name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Build CLI
        run: go build ./cmd/vibelang

      - name: Smoke CLI version
        run: go run ./cmd/vibelang --version

      - name: Build packages
        run: go build ./...

      - name: Parse example programs
        run: |
          find std examples -name '*.vibe' -print | sort | while read -r file; do
            go run ./cmd/vibelang --check "$file"
          done

      - name: Run deterministic example
        run: |
          output="$(go run ./cmd/vibelang examples/routes.vibe)"
          expected=$'true\n42\ncss/app.css\nfalse\n{}\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected routes.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi
