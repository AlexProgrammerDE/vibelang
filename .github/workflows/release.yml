name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Parse example programs
        run: |
          go run ./cmd/vibelang --check examples/hello.vibe
          go run ./cmd/vibelang --check examples/keyword_args.vibe
          go run ./cmd/vibelang --check examples/macros.vibe
          go run ./cmd/vibelang --check examples/observability.vibe
          go run ./cmd/vibelang --check examples/tool_chain.vibe
          go run ./cmd/vibelang --check examples/pi_file.vibe
          go run ./cmd/vibelang --check examples/stdlib.vibe
          go run ./cmd/vibelang --check examples/modules/main.vibe
          go run ./cmd/vibelang --check examples/ops.vibe
          go run ./cmd/vibelang --check examples/concurrency.vibe
          go run ./cmd/vibelang --check examples/http_server.vibe

      - name: Install GoReleaser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          temp_dir="$(mktemp -d)"
          gh release download \
            --repo goreleaser/goreleaser \
            --pattern 'goreleaser_Linux_x86_64.tar.gz' \
            --dir "$temp_dir"
          tar -xzf "$temp_dir/goreleaser_Linux_x86_64.tar.gz" -C "$temp_dir" goreleaser
          install -m 0755 "$temp_dir/goreleaser" "$(go env GOPATH)/bin/goreleaser"

      - name: Build and publish release artifacts
        run: "$(go env GOPATH)/bin/goreleaser release --clean"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
