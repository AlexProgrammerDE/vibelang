name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Build CLI
        run: go build ./cmd/vibelang

      - name: Smoke CLI version
        run: go run ./cmd/vibelang --version

      - name: Build packages
        run: go build ./...

      - name: Parse example programs
        run: |
          find std examples -name '*.vibe' -print | sort | while read -r file; do
            go run ./cmd/vibelang --check "$file"
          done

      - name: Run deterministic example
        run: |
          output="$(go run ./cmd/vibelang examples/routes.vibe)"
          expected=$'true\n42\ncss/app.css\nfalse\n{}\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected routes.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic unpacking example
        run: |
          output="$(go run ./cmd/vibelang examples/unpacking.vibe)"
          expected=$'Ada\nLovelace\n<h1>Ada &amp; Bob</h1>\n1\na\n2\nb\n3\nc\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected unpacking.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic tool catalog example
        run: |
          output="$(go run ./cmd/vibelang examples/tool_catalog.vibe)"
          expected=$'2\njson_parse\njson_pretty\nhttp_request\ndict\nurl\nbuiltin\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected tool_catalog.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic static asset example
        run: |
          output="$(go run ./cmd/vibelang examples/http_static.vibe)"
          expected=$'200\ntext/html; charset=utf-8\npublic, max-age=60\ntrue\napplication/wasm\n4\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected http_static.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic YAML example
        run: |
          output="$(go run ./cmd/vibelang examples/yaml.vibe)"
          expected=$'Ada\n8080\nvibelang\ntrue\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected yaml.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic runtime metrics example
        run: |
          output="$(go run ./cmd/vibelang examples/runtime_metrics.vibe)"
          expected=$'true\nfallback\ntrue\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected runtime_metrics.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic data tools example
        run: |
          output="$(go run ./cmd/vibelang examples/data_tools.vibe)"
          expected=$'Ada\nscientist\nname,role\nAda,builder\nGrace,scientist\n2026-04-17\n2026-04-17T14:04:56Z\n5400000\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected data_tools.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic collections example
        run: |
          output="$(go run ./cmd/vibelang examples/collections.vibe)"
          expected=$'true\ntrue\n[5,4,3,2,1]\nadA\n[1,2,3,4,5]\n{"name":"Ada"}\n[1,2,4]\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected collections.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic with example
        run: |
          output="$(go run ./cmd/vibelang examples/with.vibe)"
          expected=$'true\nfalse\nmemo\nfalse\nfalse\ntrue\ntrue\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected with.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic cookie example
        run: |
          output="$(go run ./cmd/vibelang examples/cookies.vibe)"
          expected=$'true\ntrue\ntrue\ndark\nabc123\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected cookies.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic config tools example
        run: |
          output="$(go run ./cmd/vibelang examples/config_tools.vibe)"
          expected=$'8080\n/users/42/files/docs/readme.md?tab=preview\ntrue\ntrue\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected config_tools.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Build and publish release artifacts
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
