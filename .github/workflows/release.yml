name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Build CLI
        run: go build ./cmd/vibelang

      - name: Smoke CLI version
        run: go run ./cmd/vibelang --version

      - name: Build packages
        run: go build ./...

      - name: Parse example programs
        run: |
          go run ./cmd/vibelang --check examples/hello.vibe
          go run ./cmd/vibelang --check examples/keyword_args.vibe
          go run ./cmd/vibelang --check examples/match.vibe
          go run ./cmd/vibelang --check examples/macros.vibe
          go run ./cmd/vibelang --check examples/observability.vibe
          go run ./cmd/vibelang --check examples/tool_chain.vibe
          go run ./cmd/vibelang --check examples/pi_file.vibe
          go run ./cmd/vibelang --check examples/stdlib.vibe
          go run ./cmd/vibelang --check examples/defer.vibe
          go run ./cmd/vibelang --check examples/url_tools.vibe
          go run ./cmd/vibelang --check examples/modules/main.vibe
          go run ./cmd/vibelang --check examples/ops.vibe
          go run ./cmd/vibelang --check examples/concurrency.vibe
          go run ./cmd/vibelang --check examples/comprehensions.vibe
          go run ./cmd/vibelang --check examples/select.vibe
          go run ./cmd/vibelang --check examples/http_server.vibe
          go run ./cmd/vibelang --check examples/directives.vibe
          go run ./cmd/vibelang --check examples/error_handling.vibe

      - name: Build and publish release artifacts
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
