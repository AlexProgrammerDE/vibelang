name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Build CLI
        run: go build ./cmd/vibelang

      - name: Smoke CLI version
        run: go run ./cmd/vibelang --version

      - name: Build packages
        run: go build ./...

      - name: Parse example programs
        run: |
          find std examples -name '*.vibe' -print | sort | while read -r file; do
            go run ./cmd/vibelang --check "$file"
          done

      - name: Run deterministic example
        run: |
          output="$(go run ./cmd/vibelang examples/routes.vibe)"
          expected=$'true\n42\ncss/app.css\nfalse\n{}\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected routes.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic unpacking example
        run: |
          output="$(go run ./cmd/vibelang examples/unpacking.vibe)"
          expected=$'Ada\nLovelace\n<h1>Ada &amp; Bob</h1>\n1\na\n2\nb\n3\nc\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected unpacking.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Run deterministic tool catalog example
        run: |
          output="$(go run ./cmd/vibelang examples/tool_catalog.vibe)"
          expected=$'2\njson_parse\njson_pretty\nhttp_request\ndict\nurl\nbuiltin\n'
          if [ "$output"$'\n' != "$expected" ]; then
            echo "unexpected tool_catalog.vibe output"
            printf 'got:\n%s\n' "$output"
            exit 1
          fi

      - name: Build and publish release artifacts
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
